#.github/workflows/cd.yml
name: RRL CD Pipeline

# --- CD Execution Policies ---------------------------------------
on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

# --- CD Permissions ----------------------------------------------
permissions:
    contents: write
    pages: write
    id-token: write

# --- CD Jobs -----------------------------------------------------
jobs:
    # --- Build | Test | Package Job ------------------------------
  build-test-package:
    # Allow compilation on different platforms
    name: ${{ matrix.os }} Build & Test
    runs-on: ${{ matrix.os }}
    env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_binary_cache
    strategy:
        fail-fast: false 
        matrix:
            os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
        - name: Checkout Code
          uses: actions/checkout@v4
          with:
            submodules: recursive 

        # Caching Setup 
        - name: Setup ccache
          uses: hendrikmuhs/ccache-action@v1.2
          with:
            key: ${{ matrix.os }}-ccache
        - name: Cache Linux APT packages
          if: runner.os == 'Linux'
          uses: actions/cache@v4
          with:
            path: /var/cache/apt/archives
            key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
            restore-keys: apt-${{ runner.os }}-
        - name: Cache macOS Homebrew packages
          if: runner.os == 'macOS'
          uses: actions/cache@v4
          with:
            path: ~/Library/Caches/Homebrew
            key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
            restore-keys: brew-${{ runner.os }}-
        - name: Cache Windows vcpkg & Chocolatey
          if: runner.os == 'Windows'
          uses: actions/cache@v4
          with:
            path: |
                ${{ github.workspace }}/vcpkg_binary_cache
                C:/ProgramData/chocolatey/cache
            key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
            restore-keys: vcpkg-${{ runner.os }}-


        # Dependencies Installation 
        - name: Install Linux Dependencies
          if: runner.os == 'Linux'
          run: |
            # Remove the runner's default auto-clean policy so our cache is preserved
            sudo rm -f /etc/apt/apt.conf.d/docker-clean
            sudo apt-get update
            sudo apt-get install -y ninja-build libglfw3-dev libopencv-dev libfmt-dev libboost-dev libxkbcommon-dev libwayland-dev xorg-dev lcov

        - name: Install macOS Dependencies
          if: runner.os == 'macOS'
          run: |
            brew install ninja pkg-config opencv glfw fmt boost

        - name: Install Windows Dependencies
          if: runner.os == 'Windows'
          run: |
            New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE
            choco install ninja --confirm
            # vcpkg will automatically detect the cached archives and skip recompiling!
            vcpkg install fmt glfw3 opencv4:x64-windows boost:x64-windows
        - name: Setup MSVC Environment (Windows)
          if: runner.os == 'Windows'
          uses: ilammy/msvc-dev-cmd@v1
      

      # Tesing (to ensure the lib runs on each platform)
        - name: Configure Tests (Linux/macOS)
          if: runner.os != 'Windows'
          run: cmake --preset test
        - name: Configure Tests (Windows)
          if: runner.os == 'Windows'
          env:
            CC: cl
            CXX: cl
          run: cmake --preset test "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"

        - name: Build Tests
          run: cmake --build --preset test
        - name: Run Tests
          run: ctest --preset run-tests


      # Distribution 
        - name: Configure Release Packages (Linux/macOS)
          if: runner.os != 'Windows'
          run: cmake --preset release
        - name: Configure Release Packages (Windows)
          if: runner.os == 'Windows'
          env:
            CC: cl
            CXX: cl
          run: cmake --preset release "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
        - name: Build Release Packages
          run: cmake --build --preset release
        - name: Generate Packages (CPack)
          run: |
            cd build/release
            cpack -C Release

      # Artifact Uploading
        - name: Upload Packages
          uses: actions/upload-artifact@v4
          with:
            name: RRL-Packages-${{ matrix.os }}
            path: |
                build/release/*.zip
                build/release/*.tar.gz
                build/release/*.deb
                build/release/*.rpm
                build/release/*.dmg
                build/release/*.msi
            if-no-files-found: warn


    # --- Deploy Documentation ------------------------------------
  deploy-docs:
        name: Deploy GitHub Pages
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
        - name: Checkout Code
          uses: actions/checkout@v4
          with:
            submodules: recursive 

        # Linux Dependencies
        - name: Setup ccache
          uses: hendrikmuhs/ccache-action@v1.2
          with:
            key: codeql-ccache
        - name: Install Linux Dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y ninja-build libglfw3-dev libopencv-dev libfmt-dev libboost-dev libxkbcommon-dev libwayland-dev xorg-dev doxygen graphviz 
        - name: Configure & Build Docs
          run: |
            cmake --preset release -DRRL_DOCUMENTATION=ON
            cmake --build --preset release --target doc_doxygen

        # Deploy docs on GitHub pages
        - name: Setup Pages
          uses: actions/configure-pages@v5
        - name: Upload Pages Artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: 'build/release/html'
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4


    # --- Publish Release -----------------------------------------
  publish-release:
        name: Publish GitHub Release
        needs: build-test-package
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
          - name: Download all packages
            uses: actions/download-artifact@v4
            with:
              pattern: RRL-Packages-*
              path: dist/
              merge-multiple: true
          - name: Create Release
            uses: softprops/action-gh-release@v2
            with:
              files: dist/*
              generate_release_notes: true
