#.github/workflows/analyze.yml
name: "RRL Static Analysis"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  analyze:
    name: C++ CodeQL Analysis
    runs-on: ubuntu-latest
    
    # Required permissions to upload the results to GitHub's Security Tab
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    # Setup the environment exactly like your test build
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: codeql-ccache
    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build libglfw3-dev libopencv-dev libfmt-dev libboost-dev libxkbcommon-dev libwayland-dev xorg-dev

    # Initialize the CodeQL Tracer
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        queries: security-and-quality 

    # Build the code (CodeQL intercepts the compiler to analyze the AST)
    - name: Configure CMake
      run: cmake --preset test
    - name: Build Engine
      run: cmake --build --preset test

    # Finalize and upload the dashboard results
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3